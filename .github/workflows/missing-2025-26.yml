name: "Missing 2025-26 (Kas-Mar)"

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 'latest'
      - uses: browser-actions/setup-geckodriver@latest

      - name: Restore previous data
        uses: actions/download-artifact@v4
        with:
          name: missing-2025-26
          path: output/
        continue-on-error: true

      - name: Run scraper
        run: |
          mkdir -p output
          python scraper_cli.py \
            --start 2025-11-02 \
            --end 2026-03-17 \
            --output output/missing_2025_26.xlsx \
            --max-hours 5.5 \
            --resume

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: missing-2025-26
          path: |
            output/missing_2025_26.xlsx
            progress.json
          retention-days: 90
          overwrite: true

      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/missing_2025_26.xlsx progress.json || true
          git diff --staged --quiet || git commit -m "Missing 2025-26 $(date +'%Y-%m-%d %H:%M')"
          git push || true
