name: "UEFA Maclari: Sampiyonlar + Avrupa + Konferans Ligi"

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Baslangic tarihi (YYYY-MM-DD)'
        required: true
        default: '2017-08-01'
      end_date:
        description: 'Bitis tarihi (YYYY-MM-DD)'
        required: true
        default: '2026-03-31'
      workers:
        description: 'Paralel thread sayisi'
        required: false
        default: '4'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pandas openpyxl beautifulsoup4

      - name: Restore previous Excel
        uses: actions/download-artifact@v4
        with:
          name: iddaa-clean-excel
          path: output/
        continue-on-error: true

      - name: Ensure Excel exists
        run: |
          if [ ! -f output/iddaagecmismaclar_clean.xlsx ]; then
            echo "Excel bulunamadi, repodaki kullanilacak"
            cp output/iddaagecmismaclar_clean.xlsx output/iddaagecmismaclar_clean.xlsx 2>/dev/null || true
          fi

      - name: Run UEFA scraper
        run: |
          python scripts/scrape_uefa.py \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --workers ${{ github.event.inputs.workers }}

      - name: Upload updated Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iddaa-clean-excel
          path: output/iddaagecmismaclar_clean.xlsx
          retention-days: 90
          overwrite: true

      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/iddaagecmismaclar_clean.xlsx || true
          git diff --staged --quiet || git commit -m "UEFA maclar eklendi: ${{ github.event.inputs.start_date }} - ${{ github.event.inputs.end_date }} $(date +'%Y-%m-%d %H:%M')"
          git push || true
